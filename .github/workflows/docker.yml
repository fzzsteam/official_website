name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    name: 构建并推送 Docker 镜像

    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 ACR Secrets
        run: |
          if [ -z "${{ secrets.ACR_USERNAME }}" ] || [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "缺少 ACR_USERNAME 或 ACR_PASSWORD secrets"
            echo "请到 GitHub Organization/Repository Secrets 确认："
            echo "1. secret 名称是否为 ACR_USERNAME / ACR_PASSWORD"
            echo "2. 该组织 secret 是否授权给 official_website 仓库"
            exit 1
          fi

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 ACR（阿里云深圳）
        uses: docker/login-action@v3
        with:
          registry: crpi-7ajeyduewy90avu4.cn-shenzhen.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            crpi-7ajeyduewy90avu4.cn-shenzhen.personal.cr.aliyuncs.com/fzzs/official_website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
