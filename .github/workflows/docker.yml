name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    name: 构建并推送 Docker 镜像

    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 ACR Secrets
        run: |
          if [ -z "${{ secrets.ACR_USERNAME }}" ] || [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "缺少 ACR_USERNAME 或 ACR_PASSWORD secrets"
            echo "请到 GitHub Organization/Repository Secrets 确认："
            echo "1. secret 名称是否为 ACR_USERNAME / ACR_PASSWORD"
            echo "2. 该组织 secret 是否授权给 official_website 仓库"
            exit 1
          fi

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 ACR（阿里云深圳）
        uses: docker/login-action@v3
        with:
          registry: crpi-7ajeyduewy90avu4.cn-shenzhen.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 安装 aliyun CLI
        run: |
          curl -sLo /tmp/aliyun-cli.tgz https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf /tmp/aliyun-cli.tgz -C /tmp
          sudo mv /tmp/aliyun /usr/local/bin/aliyun

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            crpi-7ajeyduewy90avu4.cn-shenzhen.personal.cr.aliyuncs.com/fzzs/official_website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 部署到 SAE 生产应用
        env:
          ALIBABACLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_SAE_AK_ID }}
          ALIBABACLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_SAE_AK_SECRET }}
          ALIBABACLOUD_REGION_ID: ${{ vars.SAE_REGION_ID }}
          SAE_PROD_APP_ID: ${{ secrets.SAE_PROD_APP_ID }}
        run: |
          if [ -z "$SAE_PROD_APP_ID" ]; then
            echo "SAE_PROD_APP_ID 未配置，跳过生产部署"
            exit 0
          fi

          aliyun sae DeployApplication \
            --AppId "$SAE_PROD_APP_ID" \
            --ImageUrl "crpi-7ajeyduewy90avu4-vpc.cn-shenzhen.personal.cr.aliyuncs.com/fzzs/official_website:latest"

          echo "SAE 生产环境部署已触发，请在控制台确认发布状态"
          echo "镜像：crpi-7ajeyduewy90avu4-vpc.cn-shenzhen.personal.cr.aliyuncs.com/fzzs/official_website:latest"
