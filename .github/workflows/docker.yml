name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "镜像版本号（留空则用时间戳+短 SHA）"
        required: false
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    name: 构建并推送 Docker 镜像

    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取镜像版本
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="$(date +'%Y%m%d%H%M%S')-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$TAG"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 ACR（阿里云深圳）
        uses: docker/login-action@v3
        with:
          registry: crpi-7ajeyduewy90avu4.cn-shenzhen.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            crpi-7ajeyduewy90avu4.cn-shenzhen.personal.cr.aliyuncs.com/fzzs/official_website:${{ steps.version.outputs.tag }}
            crpi-7ajeyduewy90avu4.cn-shenzhen.personal.cr.aliyuncs.com/fzzs/official_website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
