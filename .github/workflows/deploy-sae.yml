name: Deploy SAE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE_URL: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_IMAGE }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Docker login
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_REGISTRY }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Docker build
        run: docker build -t "$IMAGE_URL" .

      - name: Docker push
        run: docker push "$IMAGE_URL"

      - name: Install Aliyun CLI
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o /tmp/aliyun.tgz
          tar -xzf /tmp/aliyun.tgz -C /tmp
          sudo mv /tmp/aliyun /usr/local/bin/aliyun
          aliyun version

      - name: Configure Aliyun CLI
        run: |
          aliyun configure set \
            --mode AK \
            --region "${{ secrets.SAE_REGION_ID }}" \
            --access-key-id "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            --access-key-secret "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

      - name: Deploy SAE
        run: |
          aliyun sae DeployApplication \
            --RegionId "${{ secrets.SAE_REGION_ID }}" \
            --AppId "${{ secrets.SAE_APP_ID }}" \
            --ImageUrl "$IMAGE_URL"
