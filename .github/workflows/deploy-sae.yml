name: Deploy SAE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build docker image
        run: docker build -t "${{ secrets.SAE_REGISTRY_IMAGE }}:${{ github.sha }}" .

      - name: Push docker image
        run: docker push "${{ secrets.SAE_REGISTRY_IMAGE }}:${{ github.sha }}"

      - name: Deploy to SAE
        run: aliyun sae DeployApplication --AppId "${{ secrets.SAE_APP_ID }}" --ImageUrl "${{ secrets.SAE_REGISTRY_IMAGE }}:${{ github.sha }}"
