name: Deploy SAE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy to SAE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker login
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_REGISTRY }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t "${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}" .

      - name: Push image
        run: docker push "${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}"

      - name: Deploy to SAE
        env:
          ALICLOUD_ACCESS_KEY_ID: ${{ secrets.ALICLOUD_ACCESS_KEY_ID }}
          ALICLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALICLOUD_ACCESS_KEY_SECRET }}
          ALICLOUD_REGION: ${{ secrets.ALICLOUD_REGION }}
          SAE_APP_ID: ${{ secrets.SAE_APP_ID }}
          IMAGE_URL: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
        run: |
          echo "Deploying image to SAE"
          aliyun sae DeployApplication \
            --RegionId "$ALICLOUD_REGION" \
            --AppId "$SAE_APP_ID" \
            --ImageUrl "$IMAGE_URL"
